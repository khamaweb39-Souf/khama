services:
  # ─── API Backend (Render Web Service) ─────────────────────────────────────
  - type: web
    name: khama-api
    env: node
    plan: free
    region: frankfurt   # أقرب لشمال أفريقيا
    buildCommand: |
      cd apps/api && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: cd apps/api && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: khama-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: CLOUDINARY_URL
        sync: false   # يُضاف يدوياً من لوحة Render
      - key: ALLOWED_ORIGINS
        value: https://khama.onrender.com

  # ─── Web Frontend (Render Static Site - مجاني 100%) ────────────────────────
  - type: web
    name: khama-web
    env: static
    buildCommand: cd apps/web && npm install && npm run build
    staticPublishPath: apps/web/out
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://khama-api.onrender.com
      - key: NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME
        sync: false

databases:
  # ─── PostgreSQL Free Tier (90 يوم) ─────────────────────────────────────────
  - name: khama-db
    databaseName: khama
    plan: free
    user: khama_user
    region: frankfurt
