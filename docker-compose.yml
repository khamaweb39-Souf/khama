version: '3.8'

services:
  # قاعدة البيانات (PostgreSQL)
  khama-db:
    image: postgres:15-alpine
    container_name: khama-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: khama
    ports:
      - "5440:5432"
    volumes:
      - khama_db_data:/var/lib/postgresql/data

volumes:
  khama_db_data:
