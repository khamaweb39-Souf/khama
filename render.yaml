services:
  # ─── API Backend (Render Web Service) ─────────────────────────────────────
  - type: web
    name: khama-api
    env: node
    plan: free
    region: frankfurt   # أقرب لشمال أفريقيا
    buildCommand: |
      npm install --legacy-peer-deps && cd apps/api && npx prisma generate && npx prisma migrate deploy
    startCommand: cd apps/api && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: khama-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: CLOUDINARY_URL
        sync: false   # يُضاف يدوياً من لوحة Render
      - key: ALLOWED_ORIGINS
        value: https://khama.onrender.com

  # ─── Web Frontend (Render Web Service) ───────────────────────────
  - type: web
    name: khama-frontend-v1
    env: node
    plan: free
    region: frankfurt
    buildCommand: npm install --legacy-peer-deps && cd apps/web && npm run build
    startCommand: cd apps/web && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://khama-api.onrender.com
      - key: NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: PORT
        value: 3000
      - key: NEXT_TELEMETRY_DISABLED
        value: 1
      - key: NODE_OPTIONS
        value: --max-old-space-size=2048
      - key: GENERATE_SOURCEMAP
        value: "false"
      - key: CI
        value: "true"

databases:
  # ─── PostgreSQL Free Tier (90 يوم) ─────────────────────────────────────────
  - name: khama-db
    databaseName: khama
    plan: free
    user: khama_user
    region: frankfurt
